              $ref: "#/components/schemas/CrmRecordWriteBody"
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmRecord"

  /liberator/crms/{id}/entities/{entity}/records/{recordId}:
    get:
      operationId: getCrmRecord
      tags: [liberator]
      summary: Get a single record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: entity
          in: path
          required: true
          schema:
            type: string
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmRecord"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCrmRecord
      tags: [liberator]
      summary: Update a record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: entity
          in: path
          required: true
          schema:
            type: string
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmRecordWriteBody"
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmRecord"
    delete:
      operationId: deleteCrmRecord
      tags: [liberator]
      summary: Delete a record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: entity
          in: path
          required: true
          schema:
            type: string
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /liberator/crms/{id}/entities/{entity}/export:
    get:
      operationId: exportCrmEntity
      tags: [liberator]
      summary: Export entity records as CSV or JSON
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: entity
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: false
          schema:
            type: ["string", "null"]
            enum: [csv, json, null]
      responses:
        "200":
          description: Export file
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
            text/csv:
              schema:
                type: string

