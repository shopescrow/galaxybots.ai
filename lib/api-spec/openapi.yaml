openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GalaxyBots.ai API - AI-powered corporate bot platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bots
    description: Bot personality operations
  - name: conversations
    description: Conversation and chat operations
  - name: boardroom
    description: Internal board room communications
  - name: clients
    description: Client operations
  - name: journal
    description: Daily journal operations
  - name: blog
    description: Blog post operations
  - name: partner
    description: Partner integration operations
  - name: task-sessions
    description: Task-based bot team deployment operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List all bots
      responses:
        "200":
          description: List of bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"

  /bots/{id}:
    get:
      operationId: getBot
      tags: [bots]
      summary: Get a bot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: botId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Start a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [conversations]
      summary: Get messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent and bot responds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /boardroom/messages:
    get:
      operationId: getBoardroomMessages
      tags: [boardroom]
      summary: Get board room messages
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of board room messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoardroomMessage"
    post:
      operationId: postBoardroomMessage
      tags: [boardroom]
      summary: Post a message to the board room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostBoardroomMessageBody"
      responses:
        "201":
          description: Message posted
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoardroomMessage"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{id}/bots:
    get:
      operationId: getClientBots
      tags: [clients]
      summary: Get bots hired by a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bots hired
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"
    post:
      operationId: hireBot
      tags: [clients]
      summary: Hire a bot for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HireBotBody"
      responses:
        "201":
          description: Bot hired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientBot"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /journal:
    get:
      operationId: getJournalEntries
      tags: [journal]
      summary: Get daily journal entries
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"

  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List all published blog posts
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /partner/link:
    get:
      operationId: getPartnerLink
      tags: [partner]
      summary: Resolve a partner referral link
      parameters:
        - name: ref
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Partner info resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerInfo"
        "404":
          description: Partner not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /partner/register:
    post:
      operationId: registerPartnerUser
      tags: [partner]
      summary: Register a user referred from a partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPartnerUserBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerRegistration"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /partner/referrals:
    get:
      operationId: listPartnerReferrals
      tags: [partner]
      summary: List all partner referrals (admin/CEO only)
      parameters:
        - name: partnerRef
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Partner referrals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartnerRegistration"

  /task-sessions/analyze:
    post:
      operationId: analyzeTask
      tags: [task-sessions]
      summary: Analyze a task and propose a bot team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeTaskBody"
      responses:
        "200":
          description: Team proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamProposal"

  /task-sessions:
    get:
      operationId: listTaskSessions
      tags: [task-sessions]
      summary: List all task sessions
      responses:
        "200":
          description: List of task sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSession"
    post:
      operationId: createTaskSession
      tags: [task-sessions]
      summary: Create a new task session with approved team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskSessionBody"
      responses:
        "201":
          description: Task session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSession"

  /task-sessions/{id}:
    get:
      operationId: getTaskSession
      tags: [task-sessions]
      summary: Get a task session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /task-sessions/{id}/messages:
    get:
      operationId: getTaskSessionMessages
      tags: [task-sessions]
      summary: Get messages in a task session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of task session messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSessionMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendTaskSessionMessage
      tags: [task-sessions]
      summary: Send a message in a task session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTaskSessionMessageBody"
      responses:
        "201":
          description: Message sent and bots respond
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSessionMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /task-sessions/{id}/alerts:
    get:
      operationId: getTaskSessionAlerts
      tags: [task-sessions]
      summary: Get missing-role alerts for a task session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSessionAlert"

  /task-sessions/{id}/expand:
    post:
      operationId: expandTaskSession
      tags: [task-sessions]
      summary: Add bots to an active task session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpandTaskSessionBody"
      responses:
        "200":
          description: Session expanded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bots/fabricate:
    post:
      operationId: fabricateBot
      tags: [bots]
      summary: Fabricate a new AI-generated bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FabricateBotBody"
      responses:
        "201":
          description: Bot fabricated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Bot:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        title:
          type: string
        department:
          type: string
        category:
          type: string
        description:
          type: string
        responsibilities:
          type: array
          items:
            type: string
        personality:
          type: string
        avatar:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        isAiGenerated:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, title, department, category, description, responsibilities, personality, isAvailable, isAiGenerated, createdAt]

    Conversation:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: ["integer", "null"]
        botId:
          type: integer
        title:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, botId, title, status, createdAt, updatedAt]

    CreateConversationBody:
      type: object
      properties:
        clientId:
          type: ["integer", "null"]
        botId:
          type: integer
        title:
          type: string
      required: [botId, title]

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, bot, system]
        content:
          type: string
        senderName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, conversationId, role, content, createdAt]

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
        senderName:
          type: ["string", "null"]
      required: [content]

    MessageResponse:
      type: object
      properties:
        userMessage:
          $ref: "#/components/schemas/Message"
        botResponse:
          $ref: "#/components/schemas/Message"
      required: [userMessage, botResponse]

    BoardroomMessage:
      type: object
      properties:
        id:
          type: integer
        botId:
          type: ["integer", "null"]
        botName:
          type: ["string", "null"]
        botTitle:
          type: ["string", "null"]
        role:
          type: string
          enum: [bot, ceo, system]
        contentEncoded:
          type: string
        contentEnglish:
          type: string
        topic:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, role, contentEncoded, contentEnglish, createdAt]

    PostBoardroomMessageBody:
      type: object
      properties:
        content:
          type: string
        senderName:
          type: string
      required: [content, senderName]

    Client:
      type: object
      properties:
        id:
          type: integer
        companyName:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        plan:
          type: string
          enum: [single, team, enterprise]
        status:
          type: string
          enum: [active, inactive, trial]
        createdAt:
          type: string
          format: date-time
      required: [id, companyName, contactName, contactEmail, plan, status, createdAt]

    CreateClientBody:
      type: object
      properties:
        companyName:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        plan:
          type: string
          enum: [single, team, enterprise]
      required: [companyName, contactName, contactEmail, plan]

    ClientBot:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        botId:
          type: integer
        hiredAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, inactive]
      required: [id, clientId, botId, hiredAt, status]

    HireBotBody:
      type: object
      properties:
        botId:
          type: integer
      required: [botId]

    JournalEntry:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        title:
          type: string
        summary:
          type: string
        boardroomHighlights:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, date, title, summary, boardroomHighlights, createdAt]

    BlogPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        author:
          type: string
        category:
          type: string
        coverImage:
          type: ["string", "null"]
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, title, slug, excerpt, content, author, category, publishedAt, createdAt]

    PartnerInfo:
      type: object
      properties:
        ref:
          type: string
        partnerName:
          type: string
        partnerLogo:
          type: ["string", "null"]
        welcomeMessage:
          type: string
        offer:
          type: ["string", "null"]
        isActive:
          type: boolean
      required: [ref, partnerName, welcomeMessage, isActive]

    RegisterPartnerUserBody:
      type: object
      properties:
        partnerRef:
          type: string
        companyName:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        plan:
          type: string
          enum: [single, team, enterprise]
        source:
          type: ["string", "null"]
      required: [partnerRef, companyName, contactName, contactEmail, plan]

    PartnerRegistration:
      type: object
      properties:
        id:
          type: integer
        partnerRef:
          type: string
        clientId:
          type: integer
        companyName:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        plan:
          type: string
        source:
          type: ["string", "null"]
        status:
          type: string
        registeredAt:
          type: string
          format: date-time
      required: [id, partnerRef, clientId, companyName, contactName, contactEmail, plan, status, registeredAt]

    AnalyzeTaskBody:
      type: object
      properties:
        objective:
          type: string
      required: [objective]

    ProposedBot:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        department:
          type: string
        personality:
          type: string
        responsibilities:
          type: array
          items:
            type: string
      required: [name, title, department, personality, responsibilities]

    TeamProposal:
      type: object
      properties:
        objective:
          type: string
        matchedBots:
          type: array
          items:
            $ref: "#/components/schemas/Bot"
        proposedBots:
          type: array
          items:
            $ref: "#/components/schemas/ProposedBot"
        reasoning:
          type: string
      required: [objective, matchedBots, proposedBots, reasoning]

    TaskSessionBot:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        botId:
          type: integer
        role:
          type: string
        addedAt:
          type: string
          format: date-time
      required: [id, sessionId, botId, role, addedAt]

    TaskSession:
      type: object
      properties:
        id:
          type: integer
        objective:
          type: string
        status:
          type: string
        teamBots:
          type: array
          items:
            $ref: "#/components/schemas/Bot"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, objective, status, teamBots, createdAt, updatedAt]

    CreateTaskSessionBody:
      type: object
      properties:
        objective:
          type: string
        botIds:
          type: array
          items:
            type: integer
      required: [objective, botIds]

    TaskSessionMessage:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        botId:
          type: ["integer", "null"]
        botName:
          type: ["string", "null"]
        botTitle:
          type: ["string", "null"]
        role:
          type: string
        content:
          type: string
        flaggedRoles:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, sessionId, role, content, createdAt]

    SendTaskSessionMessageBody:
      type: object
      properties:
        content:
          type: string
        senderName:
          type: ["string", "null"]
      required: [content]

    TaskSessionAlert:
      type: object
      properties:
        role:
          type: string
        suggestedBy:
          type: string
        messageId:
          type: integer
      required: [role, suggestedBy, messageId]

    ExpandTaskSessionBody:
      type: object
      properties:
        botIds:
          type: array
          items:
            type: integer
      required: [botIds]

    FabricateBotBody:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        department:
          type: string
        personality:
          type: string
        responsibilities:
          type: array
          items:
            type: string
        description:
          type: string
        category:
          type: string
      required: [name, title, department, personality, responsibilities, description, category]
