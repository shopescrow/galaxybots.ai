openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GalaxyBots.ai API - AI-powered corporate bot platform
servers:
  - url: /api/v1
    description: Versioned API path (v1)
  - url: /api
    description: Legacy API path (deprecated — sunset 2026-10-05)
tags:
  - name: health
    description: Health operations
  - name: bots
    description: Bot personality operations
  - name: conversations
    description: Conversation and chat operations
  - name: boardroom
    description: Internal board room communications
  - name: clients
    description: Client operations
  - name: journal
    description: Daily journal operations
  - name: blog
    description: Blog post operations
  - name: partner
    description: Partner integration operations
  - name: task-sessions
    description: Task-based bot team deployment operations
  - name: compliance
    description: Compliance management operations
  - name: webhooks
    description: Webhook endpoints for external integrations
  - name: receptionist
    description: AI Receptionist voice call operations
  - name: knowledge-base
    description: Company knowledge base document management
  - name: liberator
    description: Data extraction bot — visual scraping with AI vision
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bots:
    get:
      operationId: listBots
      tags: [bots]
      summary: List all bots
      responses:
        "200":
          description: List of bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"

  /bots/{id}:
    get:
      operationId: getBot
      tags: [bots]
      summary: Get a bot by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "404":
          description: Bot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List conversations
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: botId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Start a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}/messages:
    get:
      operationId: getConversationMessages
      tags: [conversations]
      summary: Get messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent and bot responds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /boardroom/messages:
    get:
      operationId: getBoardroomMessages
      tags: [boardroom]
      summary: Get board room messages
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: List of board room messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoardroomMessage"
    post:
      operationId: postBoardroomMessage
      tags: [boardroom]
      summary: Post a message to the board room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostBoardroomMessageBody"
      responses:
        "201":
          description: Message posted
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoardroomMessage"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update client business profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/lead/{clientId}:
    post:
      operationId: ingestLead
      tags: [webhooks]
      summary: Ingest a lead from a client website
      description: Accepts a lead payload and triggers a bot qualification mission. Auth uses a per-client webhook secret as Bearer token (not JWT user auth).
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadWebhookBody"
      responses:
        "201":
          description: Lead ingested and mission triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadWebhookResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{id}/bots:
    get:
      operationId: getClientBots
      tags: [clients]
      summary: Get bots hired by a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bots hired
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"
    post:
      operationId: hireBot
      tags: [clients]
      summary: Hire a bot for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HireBotBody"
      responses:
        "201":
          description: Bot hired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientBot"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /journal:
    get:
      operationId: getJournalEntries
      tags: [journal]
      summary: Get daily journal entries
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"

  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List all published blog posts
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/{slug}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a blog post by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /partner/link:
    get:
      operationId: getPartnerLink
      tags: [partner]
      summary: Resolve a partner referral link
      parameters:
        - name: ref
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Partner info resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerInfo"
        "404":
          description: Partner not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /partner/register:
    post:
      operationId: registerPartnerUser
      tags: [partner]
      summary: Register a user referred from a partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPartnerUserBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerRegistration"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /partner/referrals:
    get:
      operationId: listPartnerReferrals
      tags: [partner]
      summary: List all partner referrals (admin/CEO only)
      parameters:
        - name: partnerRef
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Partner referrals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartnerRegistration"

  /task-sessions/analyze:
    post:
      operationId: analyzeTask
      tags: [task-sessions]
      summary: Analyze a task and propose a bot team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeTaskBody"
      responses:
        "200":
          description: Team proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamProposal"

  /task-sessions:
    get:
      operationId: listTaskSessions
      tags: [task-sessions]
      summary: List all task sessions
      responses:
        "200":
          description: List of task sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSession"
    post:
      operationId: createTaskSession
      tags: [task-sessions]
      summary: Create a new task session with approved team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskSessionBody"
      responses:
        "201":
          description: Task session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSession"

  /task-sessions/{id}:
    get:
      operationId: getTaskSession
      tags: [task-sessions]
      summary: Get a task session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /task-sessions/{id}/messages:
    get:
      operationId: getTaskSessionMessages
      tags: [task-sessions]
      summary: Get messages in a task session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of task session messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSessionMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendTaskSessionMessage
      tags: [task-sessions]
      summary: Send a message in a task session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTaskSessionMessageBody"
      responses:
        "201":
          description: Message sent and bots respond
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSessionMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /task-sessions/{id}/messages/stream:
    post:
      operationId: streamTaskSessionMessage
      tags: [task-sessions]
      summary: Send a message and stream bot responses via SSE
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTaskSessionMessageBody"
      responses:
        "200":
          description: SSE stream of agentic events
          content:
            text/event-stream:
              schema:
                type: string

  /conversations/{id}/messages/stream:
    post:
      operationId: streamConversationMessage
      tags: [conversations]
      summary: Send a message and stream bot response via SSE
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: SSE stream of agentic events
          content:
            text/event-stream:
              schema:
                type: string

  /task-sessions/{id}/alerts:
    get:
      operationId: getTaskSessionAlerts
      tags: [task-sessions]
      summary: Get missing-role alerts for a task session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskSessionAlert"

  /task-sessions/{id}/expand:
    post:
      operationId: expandTaskSession
      tags: [task-sessions]
      summary: Add bots to an active task session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpandTaskSessionBody"
      responses:
        "200":
          description: Session expanded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bots/fabricate:
    post:
      operationId: fabricateBot
      tags: [bots]
      summary: Fabricate a new AI-generated bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FabricateBotBody"
      responses:
        "201":
          description: Bot fabricated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /bots/{botId}/memories:
    get:
      operationId: getBotMemories
      tags: [memory]
      summary: Get memories for a bot
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotMemory"

  /bots/{botId}/memories/search:
    post:
      operationId: searchBotMemories
      tags: [memory]
      summary: Search bot memories semantically
      parameters:
        - name: botId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemorySearchBody"
      responses:
        "200":
          description: Matching memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotMemory"

  /memories/{id}:
    delete:
      operationId: deleteMemory
      tags: [memory]
      summary: Delete a specific memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Memory deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /task-sessions/{id}/consolidate:
    post:
      operationId: consolidateSession
      tags: [memory]
      summary: Consolidate a task session into long-term memory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Consolidation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsolidationResult"

  /bot-assignments:
    get:
      operationId: listBotAssignments
      tags: [assignments]
      summary: List all bot assignments
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotAssignment"
    post:
      operationId: createBotAssignment
      tags: [assignments]
      summary: Create a new bot assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBotAssignmentBody"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotAssignment"

  /bot-assignments/{id}:
    patch:
      operationId: updateBotAssignment
      tags: [assignments]
      summary: Update a bot assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotAssignmentBody"
      responses:
        "200":
          description: Assignment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotAssignment"
    delete:
      operationId: deleteBotAssignment
      tags: [assignments]
      summary: Delete a bot assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /bot-assignments/{id}/run:
    post:
      operationId: runBotAssignment
      tags: [assignments]
      summary: Manually run a bot assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Report generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackgroundReport"

  /background-reports:
    get:
      operationId: listBackgroundReports
      tags: [assignments]
      summary: List background reports
      parameters:
        - name: botId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BackgroundReport"

  /compliance/inbound:
    post:
      operationId: pushComplianceInbound
      tags: [compliance]
      summary: Push compliance data from external app
      parameters:
        - name: x-api-key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplianceInboundBody"
      responses:
        "201":
          description: Compliance record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformComplianceRecord"
        "401":
          description: Unauthorized

  /compliance/platform:
    get:
      operationId: getPlatformCompliance
      tags: [compliance]
      summary: Get platform compliance status
      responses:
        "200":
          description: List of compliance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformComplianceRecord"

  /compliance/platform/config:
    get:
      operationId: getPlatformComplianceConfig
      tags: [compliance]
      summary: Get compliance API configuration
      responses:
        "200":
          description: API configuration details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceConfig"

  /compliance/client/{clientId}:
    get:
      operationId: listClientCompliance
      tags: [compliance]
      summary: List client compliance requirements
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of client compliance requirements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientComplianceRequirement"
    post:
      operationId: createClientCompliance
      tags: [compliance]
      summary: Create a client compliance requirement
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientComplianceBody"
      responses:
        "201":
          description: Client compliance requirement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientComplianceRequirement"

  /compliance/client/{clientId}/{id}:
    put:
      operationId: updateClientCompliance
      tags: [compliance]
      summary: Update a client compliance requirement
      parameters:
        - name: clientId
          in: path
          required: true
