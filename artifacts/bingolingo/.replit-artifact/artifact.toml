kind = "web"
previewPath = "/bingolingo/"
title = "BingoLingo.ai"
version = "1.0.0"
id = "artifacts/bingolingo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23742
name = "web"
paths = ["/bingolingo/"]

[services.development]
run = "pnpm --filter @workspace/bingolingo run dev"

[services.env]
PORT = "23742"
BASE_PATH = "/bingolingo/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bingolingo", "run", "build"]
publicDir = "artifacts/bingolingo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
