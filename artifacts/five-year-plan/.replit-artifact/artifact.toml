kind = "slides"
previewPath = "/five-year-plan/"
title = "GalaxyBots 5-Year Strategic Plan"
version = "1.0.0"
id = "artifacts/user-guide"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
localPort = 18667
name = "web"
paths = ["/five-year-plan/"]

[services.development]
run = "pnpm --filter @workspace/five-year-plan run dev"

[services.env]
PORT = "18667"
BASE_PATH = "/five-year-plan/"

[services.production]
build = ["pnpm", "--filter", "@workspace/five-year-plan", "run", "build"]
publicDir = "artifacts/five-year-plan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
